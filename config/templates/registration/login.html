{% extends "graves/base.html" %}

{% block title %}Prijava{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-sm">

            <div class="card-body">

                <h2 class="mb-4">
                    Prijava
                </h2>

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="id_username">
                            Korisničko ime
                        </label>

                        <input type="text"
                               name="username"
                               autofocus
                               required
                               id="id_username"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="id_password">
                            Lozinka
                        </label>

                        <input type="password"
                               name="password"
                               required
                               id="id_password"
                               class="form-control">
                    </div>

                    <button type="submit"
                            class="btn btn-dark">
                        Prijava
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
