{% extends "graves/base.html" %}

{% block title %}Prezimena{% endblock %}

{% block content %}

<h1 class="mb-4">Prezimena</h1>
<form method="get" class="mb-4">
    <div class="input-group">
        <input
            type="text"
            name="q"
            value="{{ query }}"
            class="form-control"
            placeholder="Pretraži prezime..."
        >

        <button class="btn btn-dark" type="submit">
            Pretraži
        </button>
    </div>
</form>
<p class="text-muted">Pronađeno prezimena: {{ surnames|length }}</p>

<div class="row">
    {% for item in surnames %}
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>
                        <a href="{% url 'graves:surname_detail' item.last_name %}">
                            {{ item.last_name }}
                        </a>
                    </h5>

                    <p class="text-muted mb-0">
                        Broj osoba: {{ item.total }}
                    </p>
                </div>
            </div>
        </div>
    {% empty %}
        <p>Nema unesenih prezimena.</p>
    {% endfor %}
</div>

{% endblock %}
