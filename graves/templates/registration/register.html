{% extends "graves/base.html" %}

{% block title %}Registracija{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-sm">

            <div class="card-body">

                <h2 class="mb-4">
                    Registracija
                </h2>

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit"
                            class="btn btn-dark">
                        Registruj se
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
