{% extends "graves/base.html" %}

{% block title %}Prijava{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow-sm">
            <div class="card-body">

                <h2 class="mb-4">Prijava</h2>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Korisničko ime</label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label>Lozinka</label>
                        {{ form.password }}
                    </div>

                    <button type="submit" class="btn btn-dark">
                        Prijavi se
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
